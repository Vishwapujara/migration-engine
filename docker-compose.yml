services:

  # ── MongoDB ─────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────────────
  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      WORKSPACE_DIR: /app/workspace
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      # Persist cloned repos and output across restarts
      - workspace_data:/app/workspace
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Express BFF ──────────────────────────────────────────────────────
  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongodb:27017/migration_engine
      FASTAPI_URL: http://fastapi:8000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      fastapi:
        condition: service_healthy

  # ── React client (nginx) ─────────────────────────────────────────────
  client:
    build:
      context: ./frontend/client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - bff

volumes:
  mongo_data:
  workspace_data:
